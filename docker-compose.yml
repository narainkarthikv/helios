services:
  control-plane:
    build:
      context: .
      dockerfile: ops/Containerfile.control-plane
    environment:
      HELIOS_ENV: development
      HELIOS_DATABASE_URL: postgresql://helios:helios@postgres:5432/helios
      HELIOS_REDIS_URL: redis://redis:6379/0
      HELIOS_JWT_SECRET: dev-only
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: helios
      POSTGRES_DB: helios
    ports:
      - "5432:5432"
    volumes:
      - helios_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  helios_postgres:
